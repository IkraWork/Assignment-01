<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigment-01</title>
    <link rel="stylesheet" href="./style.css">

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Navbar Section start -->
    <header>
        <div>
            <img src="./assets/logo.png" alt="Logo">
        </div>
        <div>
            <nav>
                <ul>
                    <li>Speakers</li>
                    <li>Schedule</li>
                    <li>Tracks</li>
                    <li>Venue</li>
                    <li>Blog</li>
                </ul>
            </nav>
        </div>
        <div>
            <button class="common-btn">Register Now</button>
        </div>
    </header>
    <!-- Navbar Section end -->

    <!-- Banner Section start -->
    <section class="banner">
        <div class="banner-img-container">
            <img src="./assets/banner.jpg" alt="Banner">

            <div class="overlay">
                <div class="overlay-text">
                    <h1>Code. <i>Connect. </i>Create</h1>
                    <p>
                        Join 4,000+ engineers, founders, and builders at the premier developer conference of 2026. Three
                        days of cutting-edge talks, hands-on workshops, and meaningful connections.
                    </p>
                </div>

                <button class="banner-btn common-btn">Register Now</button>
            </div>
        </div>
    </section>
    <!-- Banner Section end -->
</body>

</html>
